name: Daily Active ETF Data Fetch
on:
  schedule:
    - cron: '0 9 * * 1-5'  # 每週一至五 UTC 09:00 = 台北時間 17:00
  workflow_dispatch:         # 手動觸發

permissions:
  contents: write            # 允許 push 回 repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests firebase-admin yfinance

      - name: Fetch and update data
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/update_data.py

      - name: Commit and push updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || git commit -m "📊 自動更新 $(date +'%Y-%m-%d') 持股資料"
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and deploy to Firebase Hosting
        run: |
          npm ci
          npm run build
          npx -y firebase-tools@latest deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Firebase deploy skipped (no token)"
