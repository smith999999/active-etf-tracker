name: Daily Active ETF Data Fetch
on:
  schedule:
    - cron: '0 9 * * 1-5'  # Runs at 17:00 Taipei Time (09:00 UTC) every weekday
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests firebase-admin yfinance
          
      - name: Fetch and push data to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/update_data.py
